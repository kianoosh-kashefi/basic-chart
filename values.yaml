replicaCount: 1

image:
  repository: nginx
  tag: stable
  pullPolicy: IfNotPresent

# The port the Service exposes
service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Optional extra Kubernetes objects to render alongside the chart.
# Example:
# extraObjects:
#   - apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: my-config
#     data:
#       key: value
extraObjects: []

configMap:
  enabled: false
  existingConfigMap: ""
  data: {}

secret:
  enabled: false
  existingSecret: ""
  type: Opaque
  stringData: {}

securityContext:
  fsGroup: 1000

# The container port that the Pod receives traffic on (configurable)
containerPort: 8080

# Persistence configuration
persistence:
  enabled: false
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data
  extra:
    enabled: false
    existingClaim: ""
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    mountPath: /data2

# Horizontal Pod Autoscaler settings
hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 50

# Resource requests/limits
resources: {}

# Node scheduling
nodeSelector: {}
tolerations: []
affinity: {}
